server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve Quasar SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to Flask backend
    location /api/ {
        proxy_pass http://flask-backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
